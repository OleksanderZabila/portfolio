# Render Blueprint — Infrastructure as Code.
# When this repo is connected to Render, it auto-provisions the service below.
#
# Free-tier notes:
# - The web service spins down after ~15 min of inactivity (cold start ~30s).
# - SQLite lives on ephemeral disk; the build step re-seeds on every deploy.
#   Telegram notifications fire normally; contact-form messages in the admin
#   are not persisted between deploys (use UptimeRobot to keep it warm).
services:
  - type: web
    name: aleksandr-zabila
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    buildCommand: "./build.sh"
    startCommand: "gunicorn portfolio.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: GITHUB_USERNAME
        value: OleksanderZabila
      # Set these in the Render dashboard so they stay out of git:
      #   GITHUB_TOKEN, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
      - key: GITHUB_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
